<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Portal</title>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #2563eb;
            --bg: #f1f5f9;
            --text: #475569;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        .header-area {
            margin-bottom: 40px;
        }

        .portal-logo {
            width: 250px;
    height: 80px;
    /* ইমেজটিকে জুম করে বক্সের ভেতর ফিট করবে এবং বাড়তি অংশ কেটে (crop) ফেলবে */
    object-fit: cover; 
    /* ইমেজের কোন অংশটি দেখাবে (সেন্টার রাখা সবচেয়ে নিরাপদ) */
    object-position: center; 
    display: block;
    margin: 0 auto 14px;
    /* বক্সের বাইরে কোনো অংশ যেন বের না হয় */
    overflow: hidden; 
        }

        .header-area h1 {
            font-size: clamp(24px, 5vw, 32px);
            color: var(--primary);
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .header-area p {
            color: var(--text);
            font-size: 16px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .portal-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .portal-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--accent);
        }

        /* SVG Icon Styling */
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            fill: var(--accent);
            transition: 0.3s;
        }

        .portal-card:hover .icon-wrapper {
            background: var(--accent);
        }

        .portal-card:hover .icon-wrapper svg {
            fill: white;
        }

        .portal-card h3 {
            margin: 10px 0;
            font-size: 22px;
            color: var(--primary);
        }

        .portal-card span {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
        }

        /* Mobile Specific */
        @media (max-width: 600px) {
            body {
                align-items: flex-start;
                padding: 24px 12px;
            }

            .main-wrapper {
                width: 100%;
            }

            .card-container {
                grid-template-columns: 1fr;
            }

            .portal-card {
                padding: 30px 20px;
            }
        }

        @media (max-height: 740px) {
            body {
                align-items: flex-start;
                padding-top: 20px;
                padding-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-area">
            <img src="{% static 'images/Academix_blue.svg' %}" alt="Academix Blue Logo" class="portal-logo">
            <h1>University Portal</h1>
            <p>Select your role to access the dashboard</p>
           <p>Developed By: <code><b><a href="https://www.linkedin.com/in/saynkundu/" style="text-decoration:underline; color: black;">Sayan Kundu</a></b></code></p>

        </div>

        <div class="card-container">
            <!-- Student Card -->
            <a href="user_login" class="portal-card">
                <div class="icon-wrapper">
                    <!-- Student SVG Icon -->
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3L1 9l11 6 9-4.91V17h2V9M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
                    </svg>
                </div>
                <h3>Student Login</h3>
                <span>View grades, schedule, and <br>academic resources.</span>
            </a>

            <!-- Teacher Card -->
            <a href="teacher_login" class="portal-card">
                <div class="icon-wrapper">
                    <!-- Teacher SVG Icon -->
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2m10 15V5c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v13c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2M4 5h16v11H4V5m8 14c-3.31 0-6-2.69-6-6h2c0 2.21 1.79 4 4 4s4-1.79 4-4h2c0 3.31-2.69 6-6 6z"/>
                    </svg>
                </div>
                <h3>Teacher Login</h3>
                <span>Manage classes, attendance, <br>and student evaluations.</span>
            </a>
        </div>
    </div>

</body>
</html>
