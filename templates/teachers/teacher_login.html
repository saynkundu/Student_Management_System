<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portal</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background:rgba(247, 250, 255);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px 14px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            transition: 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-3px);
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.4);
        }

        .login-card h2 {
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            color: #2c2c2c;
        }

      .teacher-login-logo-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.teacher-login-logo {
    width: 300px;         /* নির্দিষ্ট প্রস্থ */
    height: 100px;        /* নির্দিষ্ট উচ্চতা */
    object-fit: cover;    /* এটি ইমেজকে জুম করে বাড়তি অংশ কেটে (Crop) ফেলবে */
    object-position: center; /* ইমেজের মাঝখানের অংশ দেখাবে */
    display: block;
    overflow: hidden;     /* বক্সের বাইরের অংশ পুরোপুরি হাইড রাখবে */
}

        .form-control {
            height: 52px;
            border-radius: 10px;
            border: 1px solid #ddd;
            padding: 10px 15px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }

        .btn-login {
            height: 52px;
            border-radius: 10px;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: 0.3s ease;
            color: #fff;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.3);
            color:aliceblue;
        }

        .error-message {
            background-color: #fff5f5;
            color: #e53e3e;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
            border: 1px solid #fed7d7;
        }

        .bottom-link a {
            color: #6c757d;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .bottom-link a:hover {
            color: #0d6efd;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.4rem;
                border-radius: 12px;
            }

            .form-control,
            .btn-login {
                height: 48px;
            }
        }

        @media (max-height: 740px) {
            body {
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="teacher-login-logo-wrap">
            <img src="{% static 'images/Academix_blue.svg' %}" alt="Academix Blue Logo" class="teacher-login-logo">
        </div>
        <h2>Welcome Back</h2>

        <!-- Django Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="error-message">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
       
        <p>
  <strong>Demo Credentials:(Recommended)</strong><br>
  Username <code>saynkundu</code><br>
  Password <code>Summit@2025</code>
    <p>Developed By: <code><b><a href="https://www.linkedin.com/in/saynkundu/" style="text-decoration:underline; color: black;">Sayan Kundu</a></b></code></p>
</p>
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label small fw-semibold text-muted">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-semibold text-muted">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-login">Sign In</button>
        </form>

        <div class="text-center mt-4 bottom-link">
            <a href="{% url 'home' %}">← Back</a>
        </div>

    </div>
</div>

</body>
</html>
