<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        .brand-wrap {
            height: 60px;
            display: flex;
            align-items: center;
        }

        .brand-wrap a {
            display: flex;
            align-items: center;
        }

        .brand-wrap img {
            max-height: 100%;
            max-width: 180px;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .nav-toggle {
            display: none;
            width: 42px;
            height: 42px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: transparent;
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            margin-left: auto;
        }

        .nav-toggle span {
            width: 18px;
            height: 2px;
            background: #fff;
            border-radius: 3px;
            display: block;
        }

        @media (max-width: 768px) {
            .main-header {
                flex-direction: row !important;
                align-items: center !important;
                justify-content: space-between !important;
                flex-wrap: wrap;
            }

            .brand-wrap {
                margin-right: 8px;
            }

            .nav-toggle {
                display: inline-flex;
                margin-left: 0;
            }

            .main-header nav {
                display: none;
                order: 3;
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                margin-top: 10px;
            }

            .main-header nav.open {
                display: flex;
            }

            .main-header nav a {
                margin-left: 0;
                width: 100%;
                text-align: left;
            }
        }
    </style>
</head>
<body>

<header class="main-header">
    <div class="brand-wrap">
        <a href="{% url 'dashboard' %}">
            <img src="{% static 'images/Academix.svg' %}" alt="Smart Student Management Logo">
        </a>
    </div>

    <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-controls="student-nav" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav id="student-nav">
        <a href="{% url 'dashboard' %}">Home</a>
        <a href="{% url 'notices' %}">
            Notices
            {% if new_notices_count > 0 %}
                <span class="notice-count">({{ new_notices_count }})</span>
            {% endif %}
        </a>
        <a href="{% url 'fee_payments' %}">Fees Payment</a>
        <a href="{% url 'faculties' %}">Faculties</a>
        <a href="{% url 'logout' %}">Logout</a>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border-top: 1px solid #ddd; padding: 20px; gap: 15px; background-color:#2c3e50; color: white;">
    <p style="margin: 0; flex: 1 1 300px; text-align: center;">
        &copy; 2026 Smart Student Management System
    </p>
    <p style="margin: 0; flex: 1 1 300px; text-align: center;">
        Developed By:
        <code><b><a href="https://www.linkedin.com" style="text-decoration: underline; color: #00a0dc;">Sayan Kundu</a></b></code>
    </p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {
    var toggle = document.querySelector(".nav-toggle");
    var nav = document.getElementById("student-nav");
    if (!toggle || !nav) return;

    toggle.addEventListener("click", function () {
        var isOpen = nav.classList.toggle("open");
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });
});
</script>

</body>
</html>
